<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Mini Phone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1f2e;
    --ice: #4fc3f7;
    --ice-dim: rgba(79,195,247,0.12);
    --border: rgba(122,154,191,0.32);
    --border-soft: rgba(122,154,191,0.18);
    --glass: rgba(255,255,255,0.045);
    --glass-strong: rgba(255,255,255,0.07);
    --text: #e8f0fe;
    --text-dim: rgba(232,240,254,0.5);
    --radius-sm: 10px;
    --radius-md: 15px;
    --radius-lg: 18px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: pan-y;
  }

  /* 噪点纹理背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  /* ===== 状态栏 ===== */
  #statusbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 12px;
    font-size: 9px;
    color: var(--text-dim);
    z-index: 200;
    background: rgba(26,31,46,0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-soft);
    pointer-events: none;
  }
  #sb-time { justify-self: start; font-size: 9.5px; letter-spacing: 0.3px; color: var(--text); }
  #sb-name { justify-self: center; font-size: 9px; letter-spacing: 2px; color: rgba(122,154,191,0.85); }
  #sb-dots { justify-self: end; letter-spacing: 1px; font-size: 8px; }

  /* ===== 页面滑动容器 ===== */
  #phone-root {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    padding-top: 24px;
  }

  #pages-track {
    display: flex;
    width: 200%;
    height: 100%;
    transition: transform 0.38s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }

  .page {
    width: 50%;
    height: 100%;
    flex-shrink: 0;
    position: relative;
    padding: 8px 8px 20px 8px;
  }

  /* ===== 网格系统 ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    width: 100%;
    height: 100%;
  }

  /* ===== 通用组件样式 ===== */
  .widget {
    position: relative;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--glass-strong);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    transition: box-shadow 0.2s;
  }
  .widget:active { box-shadow: 0 0 0 1.5px rgba(122,154,191,0.45); }
  .widget.dragging {
    opacity: 0.8;
    box-shadow: 0 8px 28px rgba(79,195,247,0.15);
    z-index: 9999;
    pointer-events: none;
  }

  /* ===== 1. 日期+倒计时胶囊 ===== */
  #widget-date {
    grid-column: 1 / 3;
    grid-row: 1 / 2;
    display: flex;
    border-radius: var(--radius-lg);
    background: rgba(79,195,247,0.05);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .date-left {
    flex: 1.1;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid var(--border-soft);
  }
  .date-year-month {
    font-size: 8.5px;
    color: rgba(122,154,191,0.9);
    letter-spacing: 0.8px;
  }
  .date-day {
    font-size: 27px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .date-lunar {
    font-size: 7.5px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .date-right {
    flex: 1;
    padding: 6px 7px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
  }
  .countdown-title {
    font-size: 7.5px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .countdown-num {
    font-size: 24px;
    font-weight: 700;
    color: rgba(122,188,217,0.92);
    line-height: 1;
  }
  .countdown-unit { font-size: 7px; color: var(--text-dim); }

  /* ===== 2. 图片轮播 ===== */
  #widget-gallery {
    grid-column: 3 / 6;
    grid-row: 1 / 4;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    background: rgba(15,18,32,0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    overflow: hidden;
    padding: 0;
    position: relative;
  }

  #gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    position: absolute;
    inset: 0;
    transition: opacity 0.7s ease;
  }
  .gallery-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 10px;
    position: relative;
    z-index: 1;
  }
  .gallery-placeholder .ph-icon { font-size: 24px; opacity: 0.3; }

  /* ===== App区域公共 ===== */
  .apps-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5px;
    background: transparent;
    border: none !important;
    padding: 0;
    backdrop-filter: none !important;
  }

  /* ===== App图标 ===== */
  .app-icon {
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--glass-strong);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: box-shadow 0.15s, transform 0.1s;
    aspect-ratio: 1 / 1;
    width: 100%;
    padding: 6px;
  }
  .app-icon:active {
    box-shadow: 0 0 0 1.5px rgba(122,154,191,0.45);
    transform: scale(0.95);
  }
  .app-icon img {
    width: 52%;
    height: 52%;
    object-fit: cover;
    border-radius: 7px;
    flex-shrink: 0;
  }
  .app-label {
    font-size: 7px;
    color: var(--text-dim);
    text-align: center;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1;
  }
  .app-icon.empty {
    border-style: dashed;
    border-color: rgba(122,154,191,0.18);
    background: rgba(255,255,255,0.025);
  }
  .app-icon.empty::before {
    content: '+';
    font-size: 18px;
    color: rgba(122,154,191,0.2);
  }

  /* ===== 3. App区域A ===== */
  #widget-apps-a {
    grid-column: 1 / 3;
    grid-row: 2 / 4;
  }

  /* ===== 4. 消息观赏组件 ===== */
  #widget-chat {
    grid-column: 1 / 4;
    grid-row: 4 / 7;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 7px;
    background: rgba(255,255,255,0.045);
    border: 1px solid var(--border);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    overflow: hidden;
  }

  .chat-header {
    font-size: 7.5px;
    color: rgba(122,154,191,0.75);
    letter-spacing: 1.5px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 4px;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chat-row {
    display: flex;
    align-items: flex-start;
    gap: 5px;
  }

  .chat-avatar {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: var(--ice-dim);
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    cursor: pointer;
  }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .chat-bubbles {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: calc(100% - 33px);
  }

  .chat-bubble {
    background: rgba(122,154,191,0.12);
    border: 1px solid rgba(122,154,191,0.22);
    border-radius: 11px 11px 11px 3px;
    padding: 4px 9px;
    font-size: 9px;
    color: rgba(232,240,254,0.88);
    line-height: 1.5;
    word-break: break-all;
  }

  /* ===== 5. App区域B ===== */
  #widget-apps-b {
    grid-column: 4 / 6;
    grid-row: 4 / 7;
  }

  /* ===== 页面指示点 ===== */
  #page-dots {
    position: fixed;
    bottom: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 100;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(122,154,191,0.3);
    transition: background 0.2s, width 0.22s;
  }
  .dot.active {
    background: rgba(122,154,191,0.75);
    width: 13px;
    border-radius: 3px;
  }

  /* ===== 弹窗通用 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal-sheet {
    width: 100%;
    max-height: 80vh;
    background: rgba(22,28,46,0.96);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.4,0,.2,1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-title {
    font-size: 12px;
    color: rgba(122,154,191,0.95);
    font-weight: 600;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 8px;
    position: relative;
  }

  .modal-input, .modal-textarea {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    width: 100%;
    font-family: inherit;
  }
  .modal-textarea { min-height: 80px; resize: vertical; }

  .modal-btn {
    background: rgba(122,154,191,0.1);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: rgba(122,154,191,0.9);
    font-size: 12px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .modal-btn:active { background: rgba(122,154,191,0.22); }
  .modal-btn.danger { color: #e07a7a; border-color: rgba(224,122,122,0.3); background: rgba(224,122,122,0.07); }

  .modal-close {
    position: absolute;
    top: -2px; right: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
  }

  /* 倒计时条目 */
  .countdown-item {
    background: rgba(122,154,191,0.07);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .countdown-item-title { font-size: 11px; color: rgba(122,154,191,0.9); }
  .countdown-item-info { font-size: 9px; color: var(--text-dim); }
  .countdown-item-del {
    position: absolute;
    right: 7px; top: 7px;
    background: none;
    border: none;
    color: #e07a7a;
    font-size: 13px;
    cursor: pointer;
  }

  .form-row { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 10px; color: var(--text-dim); }
  .form-select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
    font-family: inherit;
  }

  /* 头像预览 */
  .avatar-preview {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--ice-dim);
    overflow: hidden;
    flex-shrink: 0;
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

  /* 拖拽幽灵 */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.78;
    border-radius: var(--radius-md);
    box-shadow: 0 10px 32px rgba(79,195,247,0.12);
    display: none;
    background: rgba(122,154,191,0.15);
    border: 1px solid var(--border);
  }

  /* 第2页 */
  #page2-empty {
    grid-column: 1/6;
    grid-row: 1/7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- 状态栏 -->
<div id="statusbar">
  <span id="sb-time">00:00</span>
  <span id="sb-name">HALO · 九</span>
  <span id="sb-dots">● ●●</span>
</div>

<div id="phone-root">
  <div id="pages-track">

    <!-- ===== 第1页 ===== -->
    <div class="page" id="page1">
      <div class="grid" id="grid1">

        <!-- 1. 日期+倒计时胶囊 -->
        <div class="widget" id="widget-date">
          <div class="date-left">
            <div class="date-year-month" id="date-ym">--/--</div>
            <div class="date-day" id="date-day">--</div>
            <div class="date-lunar" id="date-lunar">农历--</div>
          </div>
          <div class="date-right" id="countdown-area">
            <div class="countdown-title" id="cd-title">点击添加</div>
            <div class="countdown-num" id="cd-num">--</div>
            <div class="countdown-unit" id="cd-unit">天</div>
          </div>
        </div>

        <!-- 2. 图片轮播 -->
        <div class="widget" id="widget-gallery">
          <div class="gallery-placeholder" id="gallery-placeholder">
            <div class="ph-icon">🖼</div>
            <div>点击添加图片</div>
          </div>
          <img id="gallery-img" src="" alt="">
        </div>

        <!-- 3. App区域A -->
        <div class="widget apps-grid" id="widget-apps-a">
          <div class="app-icon" id="app-chat" onclick="openApp('chat')">
            <img src="https://img.icons8.com/fluency/96/chat.png" alt="聊天">
            <div class="app-label">聊天</div>
          </div>
          <div class="app-icon" id="app-settings" onclick="openApp('settings')">
            <img src="https://img.icons8.com/fluency/96/settings.png" alt="设置">
            <div class="app-label">设置</div>
          </div>
          <div class="app-icon empty" id="app-a3"></div>
          <div class="app-icon empty" id="app-a4"></div>
        </div>

        <!-- 4. 消息观赏组件 -->
        <div class="widget" id="widget-chat">
          <div class="chat-header">● MESSAGES</div>
          <div class="chat-messages" id="chat-messages-area"></div>
        </div>

        <!-- 5. App区域B -->
        <div class="widget apps-grid" id="widget-apps-b">
          <div class="app-icon empty" id="app-b1"></div>
          <div class="app-icon empty" id="app-b2"></div>
          <div class="app-icon empty" id="app-b3"></div>
          <div class="app-icon empty" id="app-b4"></div>
        </div>

      </div>
    </div>

    <!-- ===== 第2页 ===== -->
    <div class="page" id="page2">
      <div class="grid" id="grid2">
        <div id="page2-empty">
          <div style="font-size:32px;opacity:0.15;">+</div>
          <div style="font-size:10px;letter-spacing:1.5px;">空白页面</div>
          <div style="font-size:8.5px;opacity:0.4;">左滑添加组件</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="page-dots">
  <div class="dot active" data-page="0"></div>
  <div class="dot" data-page="1"></div>
</div>

<div id="drag-ghost"></div>

<script>
/* ============================================================
   工具函数
============================================================ */
function $(id) { return document.getElementById(id); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

/* ============================================================
   状态栏时间
============================================================ */
function updateStatusTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  $('sb-time').textContent = hh + ':' + mm;
}
updateStatusTime();
setInterval(updateStatusTime, 10000);

/* ============================================================
   农历计算
============================================================ */
const lunarInfo = [
  0x04AE53,0x0A5748,0x5526BD,0x0D2650,0x0D9544,0x46AAB9,0x056A4D,0x09AD42,0x24AEB6,0x04AE4A,
  0x6AA4BD,0x0A4D52,0x0D1546,0x2D92BA,0x0D5244,0x0DA548,0x55AABF,0x056A51,0x0A6E46,0x35AD9B,
  0x04AE50,0x0D1244,0x4E92B8,0x0D2540,0x0D5248,0x5D94BF,0x056A51,0x0A5B46,0x396ABB,0x04AE4F
];
const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const diZhi  = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const lunarDays = [
  '初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'
];
const solarTerms = [
  '小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
  '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
  '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'
];
const solarTermDays = [
  [6,20],[4,20],[3,18],[18,20],[5,20],[20,21],[4,20],[19,21],
  [5,21],[20,22],[5,21],[21,22],[6,23],[22,24],[7,23],[22,24],
  [7,23],[22,24],[7,24],[22,24],[7,22],[21,23],[6,21],[21,23]
];
const solarFestivals = {
  '1-1':'元旦','2-14':'情人节','3-8':'妇女节','4-1':'愚人节',
  '5-1':'劳动节','6-1':'儿童节','7-1':'建党节','8-1':'建军节',
  '9-10':'教师节','10-1':'国庆节','11-11':'双十一','12-25':'圣诞节'
};

function lunarLeapMonth(y) { return lunarInfo[y] & 0xf; }
function lunarLeapDays(y) {
  return lunarLeapMonth(y) ? ((lunarInfo[y] & 0x10000) ? 30 : 29) : 0;
}
function lunarMonthDays(y, m) {
  return (lunarInfo[y] & (0x10000 >> m)) ? 30 : 29;
}
function lunarYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y] & i) ? 1 : 0;
  return sum + lunarLeapDays(y);
}

function getLunarDate(date) {
  const baseDate = new Date(2000, 0, 7);
  let offset = Math.floor((date - baseDate) / 86400000);
  let lunarYear = 0, lunarMonth = 0, lunarDay = 0, isLeap = false;
  let i = 0, daysOfYear = 0;
  for (i = 0; i < 30 && offset > 0; i++) {
    daysOfYear = lunarYearDays(i);
    offset -= daysOfYear;
  }
  if (offset < 0) { offset += daysOfYear; i--; }
  lunarYear = 2000 + i;
  const leapMonth = lunarLeapMonth(i);
  let daysOfMonth = 0;
  for (i = 1; i <= 12 && offset > 0; i++) {
    if (leapMonth > 0 && leapMonth === i - 1 && !isLeap) {
      --i; isLeap = true;
      daysOfMonth = lunarLeapDays(lunarYear - 2000);
    } else {
      daysOfMonth = lunarMonthDays(lunarYear - 2000, i);
    }
    if (isLeap && leapMonth === i - 1) isLeap = false;
    offset -= daysOfMonth;
  }
  if (offset === 0 && leapMonth > 0 && i === leapMonth + 1) {
    if (isLeap) isLeap = false; else { isLeap = true; --i; }
  }
  if (offset < 0) { offset += daysOfMonth; --i; }
  lunarMonth = i;
  lunarDay = offset + 1;
  const ganIdx = (lunarYear - 4) % 10;
  const zhiIdx = (lunarYear - 4) % 12;
  return {
    year: lunarYear,
    month: lunarMonth,
    day: lunarDay,
    isLeap,
    yearName: tianGan[ganIdx] + diZhi[zhiIdx],
    monthName: (isLeap ? '闰' : '') + lunarMonths[lunarMonth - 1] + '月',
    dayName: lunarDays[lunarDay - 1]
  };
}

function getSolarTerm(date) {
  const m = date.getMonth();
  const d = date.getDate();
  const t0 = solarTermDays[m * 2], t1 = solarTermDays[m * 2 + 1];
  if (d === t0[0] || d === t0[1]) return solarTerms[m * 2];
  if (d === t1[0] || d === t1[1]) return solarTerms[m * 2 + 1];
  return null;
}

function getDateInfo(date) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  const lunar = getLunarDate(date);
  const fest = solarFestivals[m + '-' + d] || getSolarTerm(date) || '';
  return { y, m, d, lunar, fest };
}

/* ============================================================
   日期组件渲染
============================================================ */
function renderDate() {
  const now = new Date();
  const info = getDateInfo(now);
  $('date-ym').textContent = info.y + ' / ' + String(info.m).padStart(2,'0');
  $('date-day').textContent = String(info.d).padStart(2,'0');
  let lunarStr = info.lunar.monthName + info.lunar.dayName;
  if (info.fest) lunarStr += ' · ' + info.fest;
  $('date-lunar').textContent = lunarStr;
}
renderDate();
setInterval(renderDate, 60000);

/* ============================================================
   倒计时
============================================================ */
let countdownItems = JSON.parse(localStorage.getItem('cdItems') || '[]');
let cdIndex = 0, cdTimer = null;
function saveCD() { localStorage.setItem('cdItems', JSON.stringify(countdownItems)); }

function calcDays(item) {
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(item.date); target.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  if (item.type === 'anniversary') return Math.abs(diff) + ' 天';
  return diff >= 0 ? diff + ' 天' : '已过期';
}

function renderCountdown() {
  if (!countdownItems.length) {
    $('cd-title').textContent = '点击添加';
    $('cd-num').textContent = '--';
    $('cd-unit').textContent = '天';
    return;
  }
  const item = countdownItems[cdIndex % countdownItems.length];
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(item.date); target.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  let num, unit;
  if (item.type === 'anniversary') {
    num = Math.abs(diff); unit = '天';
  } else {
    num = diff >= 0 ? diff : 0;
    unit = diff < 0 ? '已过期' : '天';
  }
  $('cd-title').textContent = item.title;
  $('cd-num').textContent = num;
  $('cd-unit').textContent = unit;
}

function startCDRotate() {
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    if (countdownItems.length > 1) {
      cdIndex = (cdIndex + 1) % countdownItems.length;
      renderCountdown();
    }
  }, 3000);
}
renderCountdown();
startCDRotate();

$('countdown-area').addEventListener('click', openCDModal);

function openCDModal() {
  const overlay = el('div','modal-overlay');
  const sheet = el('div','modal-sheet');
  sheet.innerHTML = `<div class="modal-title">纪念日 / 倒计时<button class="modal-close" id="cd-close">✕</button></div>`;

  const listDiv = el('div','');
  listDiv.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

  function renderList() {
    listDiv.innerHTML = '';
    if (!countdownItems.length) {
      listDiv.innerHTML = '<div style="font-size:10px;color:var(--text-dim);text-align:center;padding:8px;">暂无条目</div>';
    }
    countdownItems.forEach((item, idx) => {
      const row = el('div','countdown-item');
      row.innerHTML = `<div class="countdown-item-title">${item.title}</div>
        <div class="countdown-item-info">${item.date} · ${item.type==='anniversary'?'纪念日':'倒计时'} · ${calcDays(item)}</div>
        <button class="countdown-item-del" data-idx="${idx}">✕</button>`;
      listDiv.appendChild(row);
    });
    listDiv.querySelectorAll('.countdown-item-del').forEach(btn => {
      btn.addEventListener('click', () => {
        countdownItems.splice(Number(btn.dataset.idx), 1);
        saveCD(); renderList(); renderCountdown();
      });
    });
  }
  renderList();
  sheet.appendChild(listDiv);

  const addLabel = el('div','form-label','— 添加新条目');
  addLabel.style.marginTop = '4px';
  sheet.appendChild(addLabel);

  const fTitle = el('div','form-row','<div class="form-label">标题</div>');
  const iTitle = el('input','modal-input'); iTitle.placeholder = '如：在一起第X天';
  fTitle.appendChild(iTitle); sheet.appendChild(fTitle);

  const fDate = el('div','form-row','<div class="form-label">目标日期</div>');
  const iDate = el('input','modal-input'); iDate.type = 'date';
  iDate.value = new Date().toISOString().slice(0,10);
  fDate.appendChild(iDate); sheet.appendChild(fDate);

  const fType = el('div','form-row','<div class="form-label">类型</div>');
  const iType = el('select','form-select');
  iType.innerHTML = `<option value="anniversary">纪念日（已过天数）</option><option value="countdown">倒计时（剩余天数）</option>`;
  fType.appendChild(iType); sheet.appendChild(fType);

  const addBtn = el('button','modal-btn','＋ 添加条目');
  addBtn.addEventListener('click', () => {
    if (!iTitle.value.trim()) { iTitle.style.borderColor='#e07a7a'; return; }
    countdownItems.push({ title: iTitle.value.trim(), date: iDate.value, type: iType.value });
    saveCD(); renderList(); renderCountdown(); startCDRotate();
    iTitle.value = ''; iTitle.style.borderColor = '';
  });
  sheet.appendChild(addBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#cd-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   图片轮播（每张10秒）
============================================================ */
let galleryUrls = JSON.parse(localStorage.getItem('galleryUrls') || '[]');
let galleryIdx = 0, galleryTimer = null;
function saveGallery() { localStorage.setItem('galleryUrls', JSON.stringify(galleryUrls)); }

function renderGallery() {
  const img = $('gallery-img');
  const ph  = $('gallery-placeholder');
  if (!galleryUrls.length) {
    img.style.display = 'none';
    ph.style.display  = 'flex';
    return;
  }
  ph.style.display  = 'none';
  img.style.display = 'block';
  img.style.opacity = '0';
  img.src = galleryUrls[galleryIdx];
  img.onload  = () => { img.style.opacity = '1'; };
  img.onerror = () => { img.style.opacity = '0.25'; };
}

function startGallery() {
  if (galleryTimer) clearInterval(galleryTimer);
  if (galleryUrls.length < 2) return;
  galleryTimer = setInterval(() => {
    galleryIdx = (galleryIdx + 1) % galleryUrls.length;
    renderGallery();
  }, 10000);
}

renderGallery();
startGallery();

$('widget-gallery').addEventListener('click', openGalleryModal);

function openGalleryModal() {
  const overlay = el('div','modal-overlay');
  const sheet   = el('div','modal-sheet');
  sheet.innerHTML = `<div class="modal-title">图片轮播<button class="modal-close" id="gal-close">✕</button></div>
    <div class="form-label">每行一个图片URL，每张停留10秒循环播放</div>`;

  const ta = el('textarea','modal-textarea');
  ta.placeholder = 'https://example.com/img1.jpg\nhttps://example.com/img2.jpg';
  ta.value = galleryUrls.join('\n');
  sheet.appendChild(ta);

  const confirmBtn = el('button','modal-btn','✓ 确认');
  confirmBtn.addEventListener('click', () => {
    galleryUrls = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
    galleryIdx  = 0;
    saveGallery(); renderGallery(); startGallery();
    overlay.remove();
  });
  sheet.appendChild(confirmBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#gal-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   消息观赏组件
============================================================ */
let chatData = JSON.parse(localStorage.getItem('chatData') || 'null') || {
  avatar: 'https://img.icons8.com/fluency/96/user-female-circle.png',
  messages: ['今天天气真好呢 ☀️', '想出去走走，你呢？', '一起去公园吧！']
};
function saveChatData() { localStorage.setItem('chatData', JSON.stringify(chatData)); }

function renderChatMessages() {
  const area = $('chat-messages-area');
  area.innerHTML = '';
  chatData.messages.forEach((msg, i) => {
    if (!msg.trim()) return;
    const row = el('div','chat-row');
    if (i === 0) {
      const avatarDiv = el('div','chat-avatar');
      avatarDiv.innerHTML = `<img src="${chatData.avatar}" onerror="this.src='https://img.icons8.com/fluency/96/user-female-circle.png'">`;
      avatarDiv.addEventListener('click', openAvatarModal);
      row.appendChild(avatarDiv);
    } else {
      const spacer = el('div','');
      spacer.style.cssText = 'width:25px;flex-shrink:0;';
      row.appendChild(spacer);
    }
    const bubblesDiv = el('div','chat-bubbles');
    const bubble = el('div','chat-bubble', msg);
    bubblesDiv.appendChild(bubble);
    row.appendChild(bubblesDiv);
    area.appendChild(row);
  });
}
renderChatMessages();

function openAvatarModal() {
  const overlay = el('div','modal-overlay');
  const sheet   = el('div','modal-sheet');
  sheet.innerHTML = `<div class="modal-title">编辑头像与消息<button class="modal-close" id="av-close">✕</button></div>`;

  const avatarRow = el('div','');
  avatarRow.style.cssText = 'display:flex;align-items:center;gap:10px;';

  const preview = el('div','avatar-preview');
  preview.innerHTML = `<img id="av-preview-img" src="${chatData.avatar}">`;
  avatarRow.appendChild(preview);

  const avatarCol = el('div','');
  avatarCol.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:6px;';

  const avLabel = el('div','form-label','头像URL');
  const avInput = el('input','modal-input');
  avInput.placeholder = 'https://...';
  avInput.value = chatData.avatar;
  avInput.addEventListener('input', () => { $('av-preview-img').src = avInput.value; });

  const fileLabel = el('label','modal-btn','📁 本地图片');
  fileLabel.style.cssText = 'display:block;text-align:center;cursor:pointer;font-size:11px;';
  const fileInput = el('input','');
  fileInput.type = 'file'; fileInput.accept = 'image/*';
  fileInput.style.display = 'none';
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      avInput.value = ev.target.result;
      $('av-preview-img').src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileLabel.appendChild(fileInput);
  avatarCol.appendChild(avLabel);
  avatarCol.appendChild(avInput);
  avatarCol.appendChild(fileLabel);
  avatarRow.appendChild(avatarCol);
  sheet.appendChild(avatarRow);

  const msgLabel = el('div','form-label','消息内容（每行一条）');
  const msgTA    = el('textarea','modal-textarea');
  msgTA.placeholder = '第一条消息\n第二条消息';
  msgTA.value = chatData.messages.join('\n');
  sheet.appendChild(msgLabel);
  sheet.appendChild(msgTA);

  const confirmBtn = el('button','modal-btn','✓ 确认');
  confirmBtn.addEventListener('click', () => {
    chatData.avatar   = avInput.value.trim() || chatData.avatar;
    chatData.messages = msgTA.value.split('\n').filter(s => s.trim());
    saveChatData(); renderChatMessages();
    overlay.remove();
  });
  sheet.appendChild(confirmBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#av-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   页面滑动切换
============================================================ */
let currentPage = 0;
const track = $('pages-track');
let swipeStartX = 0, swipeStartY = 0, swiping = false;

function goToPage(n) {
  currentPage = Math.max(0, Math.min(1, n));
  track.style.transform = `translateX(${-currentPage * 50}%)`;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentPage);
  });
}

$('phone-root').addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swiping = false;
}, { passive: true });

$('phone-root').addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) swiping = true;
}, { passive: true });

$('phone-root').addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (dx < -40) goToPage(currentPage + 1);
  else if (dx > 40) goToPage(currentPage - 1);
  swiping = false;
});

/* ============================================================
   App占位弹窗
============================================================ */
function openApp(name) {
  const overlay = el('div','modal-overlay');
  const sheet   = el('div','modal-sheet');
  const label   = name === 'chat' ? '💬 聊天' : '⚙️ 设置';
  sheet.innerHTML = `<div class="modal-title">${label}<button class="modal-close" id="app-close">✕</button></div>
    <div style="font-size:12px;color:var(--text-dim);text-align:center;padding:24px 0;">
      此App界面开发中…<br><span style="font-size:10px;opacity:0.45;margin-top:6px;display:block;">可在此接入AI聊天功能</span>
    </div>`;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#app-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   长按拖拽
============================================================ */
let dragEl = null;
const dragGhost = $('drag-ghost');
let dragOffX = 0, dragOffY = 0, longPressTimer = null;
const LONG_PRESS_MS = 500;

function initDrag(element) {
  element.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    longPressTimer = setTimeout(() => {
      startDrag(element, touch.clientX, touch.clientY);
    }, LONG_PRESS_MS);
  }, { passive: true });

  element.addEventListener('touchmove', e => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (!dragEl) return;
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });

  element.addEventListener('touchend', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    endDrag();
  });
}

function startDrag(element, x, y) {
  dragEl = element;
  const rect = element.getBoundingClientRect();
  dragOffX = x - rect.left;
  dragOffY = y - rect.top;
  dragGhost.style.cssText = `
    display:block;
    width:${rect.width}px;
    height:${rect.height}px;
    left:${rect.left}px;
    top:${rect.top}px;
  `;
  element.style.opacity = '0.35';
}

function moveDrag(x, y) {
  if (!dragEl) return;
  dragGhost.style.left = (x - dragOffX) + 'px';
  dragGhost.style.top  = (y - dragOffY) + 'px';
}

function endDrag() {
  if (!dragEl) return;
  dragEl.style.opacity = '';
  dragGhost.style.display = 'none';
  dragEl = null;
}

document.querySelectorAll('.widget, .app-icon').forEach(initDrag);
