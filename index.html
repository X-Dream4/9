<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Mini Phone</title>
<style>
  /* ===== 全局重置与变量 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1f2e;
    --ice: #4fc3f7;
    --ice-dim: rgba(79,195,247,0.18);
    --ice-border: rgba(79,195,247,0.35);
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.13);
    --text: #e8f0fe;
    --text-dim: rgba(232,240,254,0.55);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 20px;
    --cell: calc((100vw - 20px) / 5);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: pan-y;
  }

  /* ===== 页面滑动容器 ===== */
  #phone-root {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }

  #pages-track {
    display: flex;
    width: 200%;
    height: 100%;
    transition: transform 0.38s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }

  .page {
    width: 50%;
    height: 100%;
    flex-shrink: 0;
    position: relative;
    padding: 10px;
  }

  /* ===== 网格系统 ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    width: 100%;
    height: 100%;
  }

  /* ===== 通用组件样式 ===== */
  .widget {
    position: relative;
    border-radius: var(--radius-md);
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    transition: box-shadow 0.2s;
  }
  .widget:active { box-shadow: 0 0 0 2px var(--ice-border); }
  .widget.dragging {
    opacity: 0.82;
    box-shadow: 0 8px 32px rgba(79,195,247,0.22);
    z-index: 9999;
    pointer-events: none;
  }

  /* ===== 1. 日期+倒计时胶囊 ===== */
  #widget-date {
    grid-column: 1 / 3;
    grid-row: 1 / 2;
    display: flex;
    border-radius: var(--radius-lg);
    background: rgba(79,195,247,0.07);
    border: 1px solid var(--ice-border);
  }

  .date-left {
    flex: 1.1;
    padding: 7px 9px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid var(--ice-border);
  }
  .date-year-month {
    font-size: 9px;
    color: var(--ice);
    letter-spacing: 1px;
    opacity: 0.85;
  }
  .date-day {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .date-lunar {
    font-size: 8px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .date-right {
    flex: 1;
    padding: 7px 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .countdown-title {
    font-size: 8px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .countdown-num {
    font-size: 26px;
    font-weight: 700;
    color: var(--ice);
    line-height: 1;
  }
  .countdown-unit {
    font-size: 7px;
    color: var(--text-dim);
  }

  /* ===== 2. 图片轮播 ===== */
  #widget-gallery {
    grid-column: 3 / 6;
    grid-row: 1 / 4;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    background: #0d1120;
    overflow: hidden;
    padding: 0;
  }

  #gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.5s;
  }
  .gallery-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-dim);
    font-size: 11px;
  }
  .gallery-placeholder .icon { font-size: 28px; opacity: 0.4; }

  /* ===== 3. App区域A ===== */
  #widget-apps-a {
    grid-column: 1 / 3;
    grid-row: 2 / 4;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5px;
    background: transparent;
    border: none;
    padding: 0;
  }

  .app-icon {
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: box-shadow 0.15s;
  }
  .app-icon:active { box-shadow: 0 0 0 2px var(--ice-border); transform: scale(0.96); }
  .app-icon img {
    width: 60%;
    height: 60%;
    object-fit: cover;
    border-radius: 8px;
  }
  .app-label {
    font-size: 7px;
    color: var(--text-dim);
    text-align: center;
    width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .app-icon.empty {
    border-style: dashed;
    border-color: rgba(79,195,247,0.15);
  }
  .app-icon.empty::before {
    content: '+';
    font-size: 20px;
    color: rgba(79,195,247,0.2);
  }

  /* ===== 4. 消息观赏组件 ===== */
  #widget-chat {
    grid-column: 1 / 4;
    grid-row: 4 / 7;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .chat-header {
    font-size: 8px;
    color: var(--ice);
    letter-spacing: 1px;
    opacity: 0.7;
    border-bottom: 1px solid var(--ice-border);
    padding-bottom: 4px;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .chat-row {
    display: flex;
    align-items: flex-start;
    gap: 5px;
  }

  .chat-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--ice-dim);
    border: 1px solid var(--ice-border);
    flex-shrink: 0;
    overflow: hidden;
    cursor: pointer;
  }
  .chat-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .chat-bubbles {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: calc(100% - 35px);
  }

  .chat-bubble {
    background: rgba(79,195,247,0.13);
    border: 1px solid var(--ice-border);
    border-radius: 12px 12px 12px 3px;
    padding: 4px 9px;
    font-size: 9px;
    color: var(--text);
    line-height: 1.45;
    word-break: break-all;
  }

  /* ===== 5. App区域B ===== */
  #widget-apps-b {
    grid-column: 4 / 6;
    grid-row: 4 / 7;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5px;
    background: transparent;
    border: none;
    padding: 0;
  }

  /* ===== 第二页 ===== */
  #page2-grid {
    opacity: 0.6;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    height: 100%;
    color: var(--text-dim);
    font-size: 12px;
  }
  .page2-hint { font-size: 28px; opacity: 0.3; }

  /* ===== 页面指示点 ===== */
  #page-dots {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 100;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.2s, width 0.2s;
  }
  .dot.active {
    background: var(--ice);
    width: 14px;
    border-radius: 3px;
  }

  /* ===== 弹窗通用 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.75);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal-sheet {
    width: 100%;
    max-height: 80vh;
    background: #1e2438;
    border: 1px solid var(--ice-border);
    border-radius: 20px 20px 0 0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-title {
    font-size: 13px;
    color: var(--ice);
    font-weight: 600;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--ice-border);
    padding-bottom: 8px;
  }

  .modal-input, .modal-textarea {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--ice-border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    width: 100%;
    font-family: inherit;
  }
  .modal-textarea { min-height: 80px; resize: vertical; }

  .modal-btn {
    background: var(--ice-dim);
    border: 1px solid var(--ice-border);
    border-radius: var(--radius-sm);
    color: var(--ice);
    font-size: 12px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .modal-btn:active { background: rgba(79,195,247,0.3); }
  .modal-btn.danger { color: #ff6b6b; border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.08); }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }

  /* ===== 倒计时编辑条目 ===== */
  .countdown-item {
    background: rgba(79,195,247,0.07);
    border: 1px solid var(--ice-border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .countdown-item-title { font-size: 11px; color: var(--ice); }
  .countdown-item-info { font-size: 9px; color: var(--text-dim); }
  .countdown-item-del {
    position: absolute;
    right: 8px; top: 8px;
    background: none;
    border: none;
    color: #ff6b6b;
    font-size: 14px;
    cursor: pointer;
  }

  .form-row { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 10px; color: var(--text-dim); }
  .form-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--ice-border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
    font-family: inherit;
  }

  /* ===== 头像编辑 ===== */
  .avatar-preview {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--ice-border);
    background: var(--ice-dim);
    overflow: hidden;
    flex-shrink: 0;
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== 状态栏 ===== */
  #statusbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    font-size: 9px;
    color: var(--text-dim);
    z-index: 200;
    background: linear-gradient(to bottom, rgba(26,31,46,0.9), transparent);
    pointer-events: none;
  }

  /* ===== 长按拖拽幽灵 ===== */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.82;
    border-radius: var(--radius-md);
    box-shadow: 0 12px 40px rgba(79,195,247,0.25);
    display: none;
  }
</style>
</head>
<body>

<!-- 状态栏 -->
<div id="statusbar">
  <span id="sb-time">00:00</span>
  <span style="color:var(--ice);letter-spacing:1px;font-size:8px;">AI PHONE</span>
  <span>●●●</span>
</div>

<div id="phone-root">
  <div id="pages-track">

    <!-- ===== 第1页 ===== -->
    <div class="page" id="page1">
      <div class="grid" id="grid1">

        <!-- 1. 日期+倒计时胶囊 -->
        <div class="widget" id="widget-date">
          <div class="date-left">
            <div class="date-year-month" id="date-ym">--/--</div>
            <div class="date-day" id="date-day">--</div>
            <div class="date-lunar" id="date-lunar">农历--</div>
          </div>
          <div class="date-right" id="countdown-area">
            <div class="countdown-title" id="cd-title">点击添加</div>
            <div class="countdown-num" id="cd-num">--</div>
            <div class="countdown-unit" id="cd-unit">天</div>
          </div>
        </div>

        <!-- 2. 图片轮播 -->
        <div class="widget" id="widget-gallery" style="grid-column:3/6;grid-row:1/4;padding:0;">
          <div class="gallery-placeholder" id="gallery-placeholder">
            <div class="icon">🖼</div>
            <div>点击添加图片</div>
          </div>
          <img id="gallery-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;">
        </div>

        <!-- 3. App区域A -->
        <div id="widget-apps-a" style="grid-column:1/3;grid-row:2/4;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;background:transparent;border:none;padding:0;">
          <!-- 聊天App -->
          <div class="app-icon" id="app-chat" onclick="openApp('chat')">
            <img src="https://img.icons8.com/fluency/96/chat.png" alt="聊天">
            <div class="app-label">聊天</div>
          </div>
          <!-- 设置App -->
          <div class="app-icon" id="app-settings" onclick="openApp('settings')">
            <img src="https://img.icons8.com/fluency/96/settings.png" alt="设置">
            <div class="app-label">设置</div>
          </div>
          <!-- 空位 -->
          <div class="app-icon empty" id="app-a3"></div>
          <div class="app-icon empty" id="app-a4"></div>
        </div>

        <!-- 4. 消息观赏组件 -->
        <div class="widget" id="widget-chat" style="grid-column:1/4;grid-row:4/7;">
          <div class="chat-header">● MESSAGES</div>
          <div class="chat-messages" id="chat-messages-area">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 5. App区域B -->
        <div id="widget-apps-b" style="grid-column:4/6;grid-row:4/7;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;background:transparent;border:none;padding:0;">
          <div class="app-icon empty" id="app-b1"></div>
          <div class="app-icon empty" id="app-b2"></div>
          <div class="app-icon empty" id="app-b3"></div>
          <div class="app-icon empty" id="app-b4"></div>
        </div>

      </div><!-- /grid -->
    </div><!-- /page1 -->

    <!-- ===== 第2页 ===== -->
    <div class="page" id="page2">
      <div class="grid" id="grid2">
        <div style="grid-column:1/6;grid-row:1/7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);">
          <div style="font-size:36px;opacity:0.2;">+</div>
          <div style="font-size:11px;letter-spacing:1px;">空白页面</div>
          <div style="font-size:9px;opacity:0.5;">长按组件可拖动到此页</div>
        </div>
      </div>
    </div>

  </div><!-- /pages-track -->
</div><!-- /phone-root -->

<!-- 页面指示点 -->
<div id="page-dots">
  <div class="dot active" data-page="0"></div>
  <div class="dot" data-page="1"></div>
</div>

<!-- 拖拽幽灵 -->
<div id="drag-ghost"></div>

<script>
/* ============================================================
   工具函数
============================================================ */
function $(id) { return document.getElementById(id); }
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

/* ============================================================
   状态栏时间
============================================================ */
function updateStatusTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  $('sb-time').textContent = hh + ':' + mm;
}
updateStatusTime();
setInterval(updateStatusTime, 10000);

/* ============================================================
   农历计算（简化版，覆盖2000-2030）
============================================================ */
const lunarInfo = [
  0x04AE53,0x0A5748,0x5526BD,0x0D2650,0x0D9544,0x46AAB9,0x056A4D,0x09AD42,0x24AEB6,0x04AE4A,
  0x6AA4BD,0x0A4D52,0x0D1546,0x2D92BA,0x0D5244,0x0DA548,0x55AABF,0x056A51,0x0A6E46,0x35AD9B,
  0x04AE50,0x0D1244,0x4E92B8,0x0D2540,0x0D5248,0x5D94BF,0x056A51,0x0A5B46,0x396ABB,0x04AE4F
];
const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

const solarTerms = [
  '小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
  '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
  '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'
];
const solarTermDays = [
  [6,20],[4,20],[3,18],[18,20],[5,20],[20,21],[4,20],[19,21],
  [5,21],[20,22],[5,21],[21,22],[6,23],[22,24],[7,23],[22,24],
  [7,23],[22,24],[7,24],[22,24],[7,22],[21,23],[6,21],[21,23]
];

// 节假日（公历）
const solarFestivals = {
  '1-1':'元旦','2-14':'情人节','3-8':'妇女节','4-1':'愚人节',
  '5-1':'劳动节','6-1':'儿童节','7-1':'建党节','8-1':'建军节',
  '9-10':'教师节','10-1':'国庆节','11-11':'双十一','12-25':'圣诞节'
};

function getLunarDate(date) {
  const baseDate = new Date(2000, 0, 7);
  let offset = Math.floor((date - baseDate) / 86400000);
  let lunarYear = 0, lunarMonth = 0, lunarDay = 0;
  let isLeap = false;

  let i = 0, daysOfYear = 0;
  for (i = 0; i < 30 && offset > 0; i++) {
    daysOfYear = lunarYearDays(i);
    offset -= daysOfYear;
  }
  if (offset < 0) { offset += daysOfYear; i--; }
  lunarYear = 2000 + i;

  const leapMonth = lunarLeapMonth(i);
  let daysOfMonth = 0;
  for (i = 1; i <= 12 && offset > 0; i++) {
    if (leapMonth > 0 && leapMonth === i - 1 && !isLeap) {
      --i; isLeap = true;
      daysOfMonth = lunarLeapDays(lunarYear - 2000);
    } else {
      daysOfMonth = lunarMonthDays(lunarYear - 2000, i);
    }
    if (isLeap && leapMonth === i - 1) isLeap = false;
    offset -= daysOfMonth;
  }
  if (offset === 0 && leapMonth > 0 && i === leapMonth + 1) {
    if (isLeap) isLeap = false; else { isLeap = true; --i; }
  }
  if (offset < 0) { offset += daysOfMonth; --i; }
  lunarMonth = i;
  lunarDay = offset + 1;

  const ganIdx = (lunarYear - 4) % 10;
  const zhiIdx = (lunarYear - 4) % 12;
  const yearName = tianGan[ganIdx] + diZhi[zhiIdx];

  return {
    year: lunarYear,
    month: lunarMonth,
    day: lunarDay,
    isLeap,
    yearName,
    monthName: (isLeap ? '闰' : '') + lunarMonths[lunarMonth - 1] + '月',
    dayName: lunarDays[lunarDay - 1]
  };
}

function lunarYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) {
    sum += (lunarInfo[y] & i) ? 1 : 0;
  }
  return sum + lunarLeapDays(y);
}
function lunarLeapDays(y) {
  if (lunarLeapMonth(y)) {
    return (lunarInfo[y] & 0x10000) ? 30 : 29;
  }
  return 0;
}
function lunarLeapMonth(y) { return lunarInfo[y] & 0xf; }
function lunarMonthDays(y, m) {
  return (lunarInfo[y] & (0x10000 >> m)) ? 30 : 29;
}

function getSolarTerm(date) {
  const m = date.getMonth(); // 0-based
  const d = date.getDate();
  const termIdx = m * 2;
  if (d === solarTermDays[termIdx][0] || d === solarTermDays[termIdx][1]) return solarTerms[termIdx];
  if (d === solarTermDays[termIdx+1][0] || d === solarTermDays[termIdx+1][1]) return solarTerms[termIdx+1];
  return null;
}

function getDateInfo(date) {
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const lunar = getLunarDate(date);
  const festKey = m + '-' + d;
  const fest = solarFestivals[festKey] || getSolarTerm(date) || '';
  return { y, m, d, lunar, fest };
}

/* ============================================================
   日期组件渲染
============================================================ */
function renderDate() {
  const now = new Date();
  const info = getDateInfo(now);
  $('date-ym').textContent = info.y + ' / ' + String(info.m).padStart(2,'0');
  $('date-day').textContent = String(info.d).padStart(2,'0');
  let lunarStr = info.lunar.monthName + info.lunar.dayName;
  if (info.fest) lunarStr += ' · ' + info.fest;
  $('date-lunar').textContent = lunarStr;
}
renderDate();
setInterval(renderDate, 60000);

/* ============================================================
   倒计时/纪念日数据
============================================================ */
let countdownItems = JSON.parse(localStorage.getItem('cdItems') || '[]');
let cdIndex = 0;
let cdTimer = null;

function saveCD() { localStorage.setItem('cdItems', JSON.stringify(countdownItems)); }

function calcDays(item) {
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(item.date); target.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  if (item.type === 'anniversary') {
    return Math.abs(diff) + ' 天';
  } else {
    return diff >= 0 ? diff + ' 天' : '已过期';
  }
}

function renderCountdown() {
  if (!countdownItems.length) {
    $('cd-title').textContent = '点击添加';
    $('cd-num').textContent = '--';
    $('cd-unit').textContent = '天';
    return;
  }
  const item = countdownItems[cdIndex % countdownItems.length];
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(item.date); target.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  let num, unit;
  if (item.type === 'anniversary') {
    num = Math.abs(diff);
    unit = '天';
  } else {
    num = diff >= 0 ? diff : 0;
    unit = diff < 0 ? '已过期' : '天';
  }
  $('cd-title').textContent = item.title;
  $('cd-num').textContent = num;
  $('cd-unit').textContent = unit;
}

function startCDRotate() {
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    if (countdownItems.length > 1) {
      cdIndex = (cdIndex + 1) % countdownItems.length;
      renderCountdown();
    }
  }, 3000);
}
renderCountdown();
startCDRotate();

/* ============================================================
   倒计时编辑弹窗
============================================================ */
$('countdown-area').addEventListener('click', openCDModal);

function openCDModal() {
  const overlay = el('div','modal-overlay');
  const sheet = el('div','modal-sheet');
  sheet.innerHTML = `<div class="modal-title" style="position:relative;">纪念日 / 倒计时
    <button class="modal-close" id="cd-modal-close">✕</button></div>`;

  // 已有条目列表
  const listDiv = el('div','');
  listDiv.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
  function renderList() {
    listDiv.innerHTML = '';
    if (!countdownItems.length) {
      listDiv.innerHTML = '<div style="font-size:10px;color:var(--text-dim);text-align:center;padding:8px;">暂无条目</div>';
    }
    countdownItems.forEach((item, idx) => {
      const row = el('div','countdown-item');
      row.innerHTML = `<div class="countdown-item-title">${item.title}</div>
        <div class="countdown-item-info">${item.date} · ${item.type==='anniversary'?'纪念日':'倒计时'} · ${calcDays(item)}</div>
        <button class="countdown-item-del" data-idx="${idx}">✕</button>`;
      listDiv.appendChild(row);
    });
    listDiv.querySelectorAll('.countdown-item-del').forEach(btn => {
      btn.addEventListener('click', () => {
        countdownItems.splice(Number(btn.dataset.idx), 1);
        saveCD(); renderList(); renderCountdown();
      });
    });
  }
  renderList();
  sheet.appendChild(listDiv);

  // 添加新条目
  const addTitle = el('div','modal-title','添加新条目');
  addTitle.style.cssText = 'font-size:11px;margin-top:4px;border-bottom:none;padding-bottom:0;';
  sheet.appendChild(addTitle);

  const fTitle = el('div','form-row',`<div class="form-label">标题</div>`);
  const iTitle = el('input','modal-input'); iTitle.placeholder = '如：在一起第X天';
  fTitle.appendChild(iTitle); sheet.appendChild(fTitle);

  const fDate = el('div','form-row',`<div class="form-label">目标日期</div>`);
  const iDate = el('input','modal-input'); iDate.type = 'date';
  iDate.value = new Date().toISOString().slice(0,10);
  fDate.appendChild(iDate); sheet.appendChild(fDate);

  const fType = el('div','form-row',`<div class="form-label">类型</div>`);
  const iType = el('select','form-select');
  iType.innerHTML = `<option value="anniversary">纪念日（已过天数）</option><option value="countdown">倒计时（剩余天数）</option>`;
  fType.appendChild(iType); sheet.appendChild(fType);

  const addBtn = el('button','modal-btn','＋ 添加条目');
  addBtn.addEventListener('click', () => {
    if (!iTitle.value.trim()) { iTitle.style.borderColor='#ff6b6b'; return; }
    countdownItems.push({ title: iTitle.value.trim(), date: iDate.value, type: iType.value });
    saveCD(); renderList(); renderCountdown(); startCDRotate();
    iTitle.value = ''; iTitle.style.borderColor = '';
  });
  sheet.appendChild(addBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#cd-modal-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   图片轮播
============================================================ */
let galleryUrls = JSON.parse(localStorage.getItem('galleryUrls') || '[]');
let galleryIdx = 0;
let galleryTimer = null;

function saveGallery() { localStorage.setItem('galleryUrls', JSON.stringify(galleryUrls)); }

function renderGallery() {
  const img = $('gallery-img');
  const ph = $('gallery-placeholder');
  if (!galleryUrls.length) {
    img.style.display = 'none';
    ph.style.display = 'flex';
    return;
  }
  ph.style.display = 'none';
  img.style.display = 'block';
  img.style.opacity = '0';
  img.src = galleryUrls[galleryIdx];
  img.onload = () => { img.style.opacity = '1'; };
  img.onerror = () => { img.style.opacity = '0.3'; };
}

function startGallery() {
  if (galleryTimer) clearInterval(galleryTimer);
  if (galleryUrls.length < 2) return;
  galleryTimer = setInterval(() => {
    galleryIdx = (galleryIdx + 1) % galleryUrls.length;
    renderGallery();
  }, 1000);
}

renderGallery();
startGallery();

$('widget-gallery').addEventListener('click', openGalleryModal);

function openGalleryModal() {
  const overlay = el('div','modal-overlay');
  const sheet = el('div','modal-sheet');
  sheet.innerHTML = `<div class="modal-title" style="position:relative;">图片轮播
    <button class="modal-close" id="gal-close">✕</button></div>
    <div class="form-label">每行一个图片URL，自动循环播放（每张1秒）</div>`;

  const ta = el('textarea','modal-textarea');
  ta.placeholder = 'https://example.com/img1.jpg\nhttps://example.com/img2.jpg';
  ta.value = galleryUrls.join('\n');
  sheet.appendChild(ta);

  const confirmBtn = el('button','modal-btn','✓ 确认');
  confirmBtn.addEventListener('click', () => {
    galleryUrls = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    galleryIdx = 0;
    saveGallery(); renderGallery(); startGallery();
    overlay.remove();
  });
  sheet.appendChild(confirmBtn);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  sheet.querySelector('#gal-close').addEventListener('click', () => overlay.remove());
}

/* ============================================================
   页面左右滑动切换
============================================================ */
let currentPage = 0;
const track = $('pages-track');
let swipeStartX = 0, swipeStartY = 0, swiping = false;

function goToPage(n) {
  currentPage = Math.max(0, Math.min(1, n));
  track.style.transform = `translateX(${-currentPage * 50}%)`;
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i === currentPage);
  });
}

$('phone-root').addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swiping = false;
}, { passive: true });

$('phone-root').addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
    swiping = true;
  }
}, { passive: true });

$('phone-root').addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (dx < -40) goToPage(currentPage + 1);
  else if (dx > 40) goToPage(currentPage - 1);
  swiping = false;
});

/* ============================================================
   长按拖拽（仅视觉，单页内移动）
============================================================ */
let dragEl = null, dragGhost = $('drag-ghost');
let dragOffX = 0, dragOffY = 0;
let longPressTimer = null;
const LONG_PRESS_MS = 500;

function initDrag(el) {
  el.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    longPressTimer = setTimeout(() => {
      startDrag(el, touch.clientX, touch.clientY);
    }, LONG_PRESS_MS);
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (!dragEl) return;
    const touch = e.touches[0];
    moveDrag(touch.clientX, touch.clientY);
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('touchend', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    endDrag();
  });
}

function startDrag(element, x, y) {
  dragEl = element;
  const rect = element.getBoundingClientRect();
  dragOffX = x - rect.left;
  dragOffY = y - rect.top;
  dragGhost.style.cssText = `
    display:block;
    width:${rect.width}px;
    height:${rect.height}px;
    left:${rect.left}px;
    top:${rect.top}px;
    background: rgba(79,195,247,0.18);
    border: 1px solid var(--ice-border);
  `;
  element.style.opacity = '0.4';
}

function moveDrag(x, y) {
  if (!dragEl) return;
  dragGhost.style.left = (x - dragOffX) + 'px';
  dragGhost.style.top  = (y - dragOffY) + 'px';
}

function endDrag() {
  if (!dragEl) return;
  dragEl.style.opacity = '';
  dragGhost.style.display = 'none';
  dragEl = null;
}

// 对所有可拖动组件初始化
document.querySelectorAll('.widget, .app-icon').forEach(initDrag);

/* ============================================================
   背景粒子装饰（轻量）
============================================================ */
(function initBg() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35;';
  document.body.insertBefore(canvas, document.body.firstChild);
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeParticles() {
    particles = Array.from({length: 28}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      alpha: Math.random() * 0.5 + 0.15
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(79,195,247,${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
    });
    requestAnimationFrame(draw);
  }

  resize(); makeParticles(); draw();
  window.addEventListener('resize', () => { resize(); makeParticles(); });
})();
